name: CI

on:
  pull_request:
  push:
    branches: [main, work]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec cdk synth --app "pnpm exec tsx aws/iac/stack.ts" -c vercelTeam=ci-team -c vercelProject=ci-project
      - run: python -m pip install ./sdk/python
      - run: python -m unittest discover -s sdk/python/tests
