name: Publish SDKs

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm packages:check

  publish-python:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build sdk/python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    strategy:
      max-parallel: 1
      matrix:
        package:
          - packages/core
          - packages/langchain
          - packages/openai-agents
          - packages/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@latest
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm test
        working-directory: ${{ matrix.package }}
      - run: npm publish --access public --provenance
        working-directory: ${{ matrix.package }}

  publish-openclaw:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@latest
      - run: pnpm install --frozen-lockfile
        working-directory: plugins/openclaw
      - run: pnpm test
        working-directory: plugins/openclaw
      - run: pnpm publish --access public --provenance --no-git-checks
        working-directory: plugins/openclaw
